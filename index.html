<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボイス＆ビデオチャット</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 550px; margin: 30px auto; padding: 20px; background: #eceff1; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button, select { padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        input { width: 100%; margin-bottom: 15px; }
        button { width: 100%; background: #007aff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.danger { background: #ff3b30; }
        button.danger:hover { background: #c61a09; }
        button.active { background: #34c759; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #f8f9fa; margin-bottom: 8px; border-radius: 6px; }
        li button { width: auto; padding: 8px 16px; font-size: 14px; margin: 0; }
        .hidden { display: none; }
        .status { text-align: center; color: #666; font-size: 14px; margin-top: 15px; background: #f0f0f0; padding: 8px; border-radius: 4px; }
        .flex-group { display: flex; gap: 10px; }
        .flex-group button { width: auto; flex-grow: 1; }
        .empty-message { color: #999; text-align: center; padding: 20px; font-style: italic; }
        
        /* 参加者リスト用スタイル */
        .member-item { flex-direction: column; align-items: flex-start; gap: 8px; }
        .member-info { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .volume-container { display: flex; align-items: center; gap: 10px; width: 100%; color: #555; font-size: 14px; }
        .volume-slider { width: 100%; margin: 0; }

        /* ビデオプレビュー用スタイル */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .video-container { background: #000; border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); color: white; padding: 2px 6px; font-size: 11px; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>📢 ルーム一覧＆個別音量付きボイチャ</h2>

    <div id="login-view" class="card">
        <h3>👤 あなたの名前を入力してください</h3>
        <input type="text" id="username-input" placeholder="ニックネーム（例: たろう）">
        <button onclick="saveUsername()">次へ進む</button>
    </div>

    <div id="lobby-view" class="card hidden">
        <p>ようこそ、<b id="my-name-display"></b> さん！</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        
        <h3>🆕 新しい部屋を作る</h3>
        <input type="text" id="room-name-input" placeholder="部屋の名前（例：雑談部屋など）">
        <input type="password" id="room-password-input" maxlength="5" placeholder="パスワード（数字5桁・任意）">
        <button onclick="createNewRoom()">部屋を作成する</button>

        <h3 style="margin-top: 30px;">🚪 開放中の部屋一覧</h3>
        <ul id="room-list"></ul>
        <div id="no-rooms" class="empty-message">現在、部屋はありません。部屋を作ってみましょう！</div>
    </div>

    <div id="room-view" class="card hidden">
        <h3 id="current-room-title">部屋: 未参加</h3>
        <div class="status" id="connection-status">接続を準備中...</div>
        
        <div class="video-grid">
            <div class="video-container">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="video-label">あなた</div>
            </div>
            <div class="video-container" id="remote-video-wrapper">
                <div id="video-placeholder" style="color: #666; font-size: 13px;">相手の映像なし</div>
                <video id="remote-video" autoplay playsinline style="display: none;"></video>
                <div class="video-label" id="remote-video-label">相手</div>
            </div>
        </div>

        <h4 style="margin-top: 20px; margin-bottom: 10px;">👥 参加中のメンバー一覧 (音量調整)</h4>
        <ul id="member-list"></ul>
        
        <div class="flex-group" style="margin-top: 25px;">
            <button id="mute-btn" onclick="toggleMute()" class="active">🎙️ 自分をマイクON</button>
            <button id="camera-btn" onclick="toggleCamera()" class="danger">📁 自分をカメラOFF</button>
            <button onclick="leaveRoom()" class="danger">🚪 退室</button>
        </div>
    </div>

    <script>
        const LOBBY_ID = "GLOBAL_VOICE_CHAT_LOBBY_2026_V2";
        
        let myUsername = "";
        let lobbyPeer = null;
        let activeConnections = []; 
        let roomList = [];         
        
        let voicePeer = null;      
        let localStream = null;
        let currentCall = null;
        let isMuted = false;
        let isCameraOn = false; // 初期状態はカメラOFF
        let isHostOfCurrentRoom = false; 
        let currentRoomId = "";

        // 相手のMedia（Video/Audio共通）要素への参照
        let remoteVideoEl = null;

        // 1. 名前入力の保存
        function saveUsername() {
            const input = document.getElementById('username-input');
            myUsername = input.value.trim();
            if (!myUsername) return alert('名前を入力してください');

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('lobby-view').classList.remove('hidden');
            document.getElementById('my-name-display').innerText = myUsername;

            initLobby();
        }

        // 2. ロビー（部屋一覧同期）処理
        function initLobby() {
            lobbyPeer = new Peer(LOBBY_ID);

            lobbyPeer.on('open', () => {
                console.log("あなたがロビーのホストになりました。");
                setupHostHandlers();
            });

            lobbyPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    console.log("すでにホストが存在するため、ゲストとして参加します。");
                    connectToHost();
                }
            });
        }

        function setupHostHandlers() {
            lobbyPeer.on('connection', (conn) => {
                activeConnections.push(conn);
                conn.on('open', () => {
                    conn.send({ type: 'ROOM_LIST', data: roomList });
                });
                
                conn.on('data', (data) => {
                    if (data.type === 'CREATE_ROOM') {
                        addRoomToList(data.roomObj);
                    } else if (data.type === 'REMOVE_ROOM') {
                        removeRoomFromList(data.roomId);
                    }
                });
            });
        }

        let hostConnection = null;
        function connectToHost() {
            lobbyPeer = new Peer();
            lobbyPeer.on('open', () => {
                hostConnection = lobbyPeer.connect(LOBBY_ID);
                
                hostConnection.on('data', (data) => {
                    if (data.type === 'ROOM_LIST') {
                        roomList = data.data;
                        renderRoomList();
                    }
                });
            });
        }

        function renderRoomList() {
            const listEl = document.getElementById('room-list');
            const emptyEl = document.getElementById('no-rooms');
            listEl.innerHTML = '';

            if (roomList.length === 0) {
                emptyEl.style.display = 'block';
                return;
            }
            emptyEl.style.display = 'none';

            roomList.forEach(room => {
                const li = document.createElement('li');
                const isLocked = room.hasPassword ? '🔒 ' : '';
                li.innerHTML = `
                    <span>🔊 <b>${isLocked}${room.name}</b> <small style="color:#888;">(作った人: ${room.creatorName})</small></span>
                    <button onclick="checkPasswordAndJoin('${room.id}', '${room.name}', '${room.creatorName}')">参加する</button>
                `;
                listEl.appendChild(li);
            });
        }

        function createNewRoom() {
            const input = document.getElementById('room-name-input');
            const passInput = document.getElementById('room-password-input');
            const name = input.value.trim();
            const password = passInput.value.trim();

            if (!name) return alert('部屋名を入力してください');
            
            // 数字5桁のバリデーション（入力されている場合のみ）
            if (password && !/^\d{5}$/.test(password)) {
                return alert('パスワードは数字5桁で入力してください（かけない場合は空欄）');
            }

            const roomId = 'room-' + Date.now();
            const newRoom = { 
                name: name, 
                id: roomId, 
                creatorName: myUsername,
                hasPassword: password !== "",
                password: password // 簡易実装のため平文保存
            };

            isHostOfCurrentRoom = true; 
            currentRoomId = roomId;

            if (hostConnection) {
                hostConnection.send({ type: 'CREATE_ROOM', roomObj: newRoom });
            } else {
                addRoomToList(newRoom);
            }

            input.value = '';
            passInput.value = '';
            startVoiceChat(roomId, name, true, myUsername);
        }

        function checkPasswordAndJoin(roomId, roomName, creatorName) {
            const targetRoom = roomList.find(r => r.id === roomId);
            if (!targetRoom) return;

            if (targetRoom.hasPassword) {
                const userPass = prompt('この部屋にはパスワードが必要です。\n数字5桁を入力してください:');
                if (userPass === null) return; // キャンセル
                if (userPass !== targetRoom.password) {
                    return alert('パスワードが一致しません。');
                }
            }
            startVoiceChat(roomId, roomName, false, creatorName);
        }

        function addRoomToList(roomObj) {
            roomList.push(roomObj);
            renderRoomList();
            broadcastToAll({ type: 'ROOM_LIST', data: roomList });
        }

        function removeRoomFromList(roomId) {
            roomList = roomList.filter(r => r.id !== roomId);
            renderRoomList();
            broadcastToAll({ type: 'ROOM_LIST', data: roomList });
        }

        function broadcastToAll(msg) {
            activeConnections.forEach(conn => {
                if (conn.open) conn.send(msg);
            });
        }


        // 3. ボイス＆ビデオチャット & 参加者個別ボリューム処理
        async function startVoiceChat(roomId, displayTitle, isCreator, creatorName) {
            currentRoomId = roomId;
            document.getElementById('lobby-view').classList.add('hidden');
            document.getElementById('room-view').classList.remove('hidden');
            document.getElementById('current-room-title').innerText = `部屋: ${displayTitle}`;
            document.getElementById('connection-status').innerText = 'メディア（マイク/カメラ）を取得中...';

            // 初期リストとして自分を表示
            updateMemberList(creatorName);

            try {
                // 音声とビデオ両方を取得
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                
                // 自分の映像を画面にセット
                document.getElementById('local-video').srcObject = localStream;
                
                // 初期状態ではカメラはOFFにする（トラックを無効化）
                localStream.getVideoTracks().forEach(track => track.enabled = false);
                isCameraOn = false;
                updateCameraBtnStyle();

                const myVoiceId = isCreator ? roomId : `${roomId}-client`;
                const targetVoiceId = isCreator ? `${roomId}-client` : roomId;

                voicePeer = new Peer(myVoiceId);

                voicePeer.on('open', () => {
                    if (isCreator) {
                        document.getElementById('connection-status').innerText = 'ユーザーの参加を待っています...';
                    } else {
                        document.getElementById('connection-status').innerText = '接続中...';
                        const call = voicePeer.call(targetVoiceId, localStream, { metadata: { username: myUsername } });
                        setupCallHandlers(call, creatorName);
                    }
                });

                voicePeer.on('call', (call) => {
                    call.answer(localStream);
                    const remoteUser = call.metadata ? call.metadata.username : "ゲスト参加者";
                    setupCallHandlers(call, remoteUser);
                });

            } catch (err) {
                console.error(err);
                alert('マイクまたはカメラの開始に失敗しました。デバイスの許可を確認してください。');
                leaveRoom();
            }
        }

        function setupCallHandlers(call, remoteUserName) {
            currentCall = call;
            
            // 参加者一覧に相手を追加
            updateMemberList(remoteUserName);
            document.getElementById('remote-video-label').innerText = remoteUserName;

            call.on('stream', (remoteStream) => {
                document.getElementById('connection-status').innerText = '🟢 通話中';
                
                // 相手用のビデオタグにストリームをセット
                const videoEl = document.getElementById('remote-video');
                videoEl.srcObject = remoteStream;
                videoEl.style.display = 'block';
                document.getElementById('video-placeholder').style.display = 'none';
                
                remoteVideoEl = videoEl;

                // 相手が退出した時などの管理用に退避
                window.remoteStreamRef = remoteStream;
            });

            call.on('close', () => {
                alert('相手が退室しました。');
                leaveRoom();
            });
        }

        // 参加者一覧と音量スライダーを描画
        function updateMemberList(partnerName) {
            const listEl = document.getElementById('member-list');
            listEl.innerHTML = "";

            // 1. 自分を表示
            const liMe = document.createElement('li');
            liMe.className = "member-item";
            liMe.innerHTML = `<div class="member-info"><span>👤 <b>${myUsername}</b> (あなた)</span></div>`;
            listEl.appendChild(liMe);

            // 2. 相手がいれば表示（音量調整バー付き）
            if (partnerName && partnerName !== myUsername) {
                const liOther = document.createElement('li');
                liOther.className = "member-item";
                liOther.innerHTML = `
                    <div class="member-info"><span>👤 <b>${partnerName}</b></span></div>
                    <div class="volume-container">
                        <span>🔈</span>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" oninput="changeVolume(this.value)">
                        <span>🔊</span>
                    </div>
                `;
                listEl.appendChild(liOther);
            }
        }

        // 個別音量を変更する関数
        function changeVolume(value) {
            if (remoteVideoEl) {
                remoteVideoEl.volume = value;
            }
        }

        // マイクのON/OFF切り替え
        function toggleMute() {
            if (!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if (isMuted) {
                audioTrack.enabled = true;
                document.getElementById('mute-btn').innerText = '🎙️ 自分をマイクON';
                document.getElementById('mute-btn').className = 'active';
                isMuted = false;
            } else {
                audioTrack.enabled = false;
                document.getElementById('mute-btn').innerText = '🔇 ミュート中';
                document.getElementById('mute-btn').className = 'danger';
                isMuted = true;
            }
        }

        // カメラのON/OFF切り替え
        function toggleCamera() {
            if (!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) return alert('カメラデバイスが見つかりません');

            if (isCameraOn) {
                videoTrack.enabled = false;
                isCameraOn = false;
            } else {
                videoTrack.enabled = true;
                isCameraOn = true;
            }
            updateCameraBtnStyle();
        }

        function updateCameraBtnStyle() {
            const btn = document.getElementById('camera-btn');
            if (isCameraOn) {
                btn.innerText = '🎥 自分をカメラON';
                btn.className = 'active';
            } else {
                btn.innerText = '📁 自分をカメラOFF';
                btn.className = 'danger';
            }
        }

        // 退室
        function leaveRoom() {
            if (isHostOfCurrentRoom) {
                if (hostConnection) {
                    hostConnection.send({ type: 'REMOVE_ROOM', roomId: currentRoomId });
                } else {
                    removeRoomFromList(currentRoomId);
                }
            }

            if (currentCall) currentCall.close();
            if (voicePeer) voicePeer.destroy();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            // 初期化とUIリセット
            remoteVideoEl = null;
            isMuted = false;
            isCameraOn = false;
            isHostOfCurrentRoom = false;
            
            document.getElementById('mute-btn').innerText = '🎙️ 自分をマイクON';
            document.getElementById('mute-btn').className = 'active';
            document.getElementById('local-video').srcObject = null;
            
            const rVideo = document.getElementById('remote-video');
            rVideo.srcObject = null;
            rVideo.style.display = 'none';
            document.getElementById('video-placeholder').style.display = 'block';
            document.getElementById('member-list').innerHTML = '';
            
            document.getElementById('lobby-view').classList.remove('hidden');
            document.getElementById('room-view').classList.add('hidden');
        }

        window.onbeforeunload = () => {
            if (isHostOfCurrentRoom) {
                if (hostConnection) {
                    hostConnection.send({ type: 'REMOVE_ROOM', roomId: currentRoomId });
                } else {
                    removeRoomFromList(currentRoomId);
                }
            }
        };
    </script>
</body>
</html>
