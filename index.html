<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3人以上対応 高機能ボイス＆ビデオチャット</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; background: #eceff1; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button, select { padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        input { width: 100%; margin-bottom: 15px; }
        button { width: 100%; background: #007aff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.danger { background: #ff3b30; }
        button.danger:hover { background: #c61a09; }
        button.active { background: #34c759; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #f8f9fa; margin-bottom: 8px; border-radius: 6px; }
        .hidden { display: none; }
        .status { text-align: center; color: #666; font-size: 14px; margin-top: 15px; background: #f0f0f0; padding: 8px; border-radius: 4px; }
        .flex-group { display: flex; gap: 10px; }
        .flex-group button { width: auto; flex-grow: 1; }
        .empty-message { color: #999; text-align: center; padding: 20px; font-style: italic; }
        
        /* 参加者リスト用スタイル */
        .member-item { flex-direction: column; align-items: flex-start; gap: 8px; width: 100%; }
        .member-info { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .volume-container { display: flex; align-items: center; gap: 10px; width: 100%; color: #555; font-size: 14px; }
        .volume-slider { width: 100%; margin: 0; }

        /* ビデオグリッド（人数に合わせて綺麗に並びます） */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 15px; }
        .video-container { background: #000; border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); color: white; padding: 2px 6px; font-size: 11px; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>📢 複数人対応ルーム＆個別音量チャット</h2>

    <div id="login-view" class="card">
        <h3>👤 あなたの名前を入力してください</h3>
        <input type="text" id="username-input" placeholder="ニックネーム（例: たろう）">
        <button onclick="saveUsername()">次へ進む</button>
    </div>

    <div id="lobby-view" class="card hidden">
        <p>ようこそ、<b id="my-name-display"></b> さん！</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        
        <h3>🆕 新しい部屋を作る</h3>
        <input type="text" id="room-name-input" placeholder="部屋の名前（例：みんなで雑談など）">
        <input type="password" id="room-password-input" maxlength="5" placeholder="パスワード（数字5桁・任意）">
        <button onclick="createNewRoom()">部屋を作成する</button>

        <h3 style="margin-top: 30px;">🚪 開放中の部屋一覧</h3>
        <ul id="room-list"></ul>
        <div id="no-rooms" class="empty-message">現在、部屋はありません。部屋を作ってみましょう！</div>
    </div>

    <div id="room-view" class="card hidden">
        <h3 id="current-room-title">部屋: 未参加</h3>
        <div class="status" id="connection-status">接続を準備中...</div>
        
        <div class="video-grid" id="video-grid">
            <div class="video-container" id="local-video-container">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="video-label">あなた</div>
            </div>
        </div>

        <h4 style="margin-top: 20px; margin-bottom: 10px;">👥 参加中のメンバー一覧 (音量調整)</h4>
        <ul id="member-list"></ul>
        
        <div class="flex-group" style="margin-top: 25px;">
            <button id="mute-btn" onclick="toggleMute()" class="active">🎙️ 自分をマイクON</button>
            <button id="camera-btn" onclick="toggleCamera()" class="danger">📁 自分をカメラOFF</button>
            <button onclick="leaveRoom()" class="danger">🚪 退室</button>
        </div>
    </div>

    <script>
        const LOBBY_ID = "GLOBAL_VOICE_CHAT_LOBBY_2026_MESH";
        
        let myUsername = "";
        let myPeerId = "";
        let lobbyPeer = null;
        let activeConnections = []; // ロビー管理用接続リスト
        let roomList = [];         
        
        let voicePeer = null;      
        let localStream = null;
        let isMuted = false;
        let isCameraOn = false; 
        let isHostOfCurrentRoom = false; 
        let currentRoomId = "";

        // 複数人管理用のオブジェクト（キー：相手のPeerID）
        let connectedCalls = {};
        let connectedDataConns = {};
        let roomMembers = {}; // { peerId: username }

        function saveUsername() {
            const input = document.getElementById('username-input');
            myUsername = input.value.trim();
            if (!myUsername) return alert('名前を入力してください');

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('lobby-view').classList.remove('hidden');
            document.getElementById('my-name-display').innerText = myUsername;

            initLobby();
        }

        function initLobby() {
            lobbyPeer = new Peer(LOBBY_ID);

            lobbyPeer.on('open', () => {
                console.log("あなたがロビーのホストになりました。");
                setupHostHandlers();
            });

            lobbyPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    console.log("ロビーホストが存在するため、ゲストとして参加します。");
                    connectToHost();
                }
            });
        }

        function setupHostHandlers() {
            lobbyPeer.on('connection', (conn) => {
                activeConnections.push(conn);
                conn.on('open', () => {
                    conn.send({ type: 'ROOM_LIST', data: roomList });
                });
                
                conn.on('data', (data) => {
                    if (data.type === 'CREATE_ROOM') {
                        addRoomToList(data.roomObj);
                    } else if (data.type === 'UPDATE_ROOM_MEMBERS') {
                        // メンバー一覧が変動した時に上書き更新
                        const room = roomList.find(r => r.id === data.roomId);
                        if (room) {
                            room.members = data.members;
                            broadcastToAll({ type: 'ROOM_LIST', data: roomList });
                        }
                    } else if (data.type === 'REMOVE_ROOM') {
                        removeRoomFromList(data.roomId);
                    }
                });
                conn.on('close', () => {
                    activeConnections = activeConnections.filter(c => c !== conn);
                });
            });
        }

        let hostConnection = null;
        function connectToHost() {
            lobbyPeer = new Peer();
            lobbyPeer.on('open', () => {
                hostConnection = lobbyPeer.connect(LOBBY_ID);
                hostConnection.on('data', (data) => {
                    if (data.type === 'ROOM_LIST') {
                        // 自分が参加中の部屋が消滅していたら強制退室
                        if (currentRoomId && !isHostOfCurrentRoom) {
                            const roomExists = data.data.some(r => r.id === currentRoomId);
                            if (!roomExists) {
                                alert('部屋が解散されました。');
                                leaveRoom();
                            }
                        }
                        roomList = data.data;
                        renderRoomList();
                    }
                });
            });
        }

        function renderRoomList() {
            const listEl = document.getElementById('room-list');
            const emptyEl = document.getElementById('no-rooms');
            listEl.innerHTML = '';

            if (roomList.length === 0) {
                emptyEl.style.display = 'block';
                return;
            }
            emptyEl.style.display = 'none';

            roomList.forEach(room => {
                const li = document.createElement('li');
                const isLocked = room.hasPassword ? '🔒 ' : '';
                const memberCount = room.members ? Object.keys(room.members).length : 1;
                li.innerHTML = `
                    <span>🔊 <b>${isLocked}${room.name}</b> <small style="color:#888;">(作成者: ${room.creatorName} | 参加: ${memberCount}人)</small></span>
                    <button onclick="checkPasswordAndJoin('${room.id}', '${room.name}')">参加する</button>
                `;
                listEl.appendChild(li);
            });
        }

        function createNewRoom() {
            const input = document.getElementById('room-name-input');
            const passInput = document.getElementById('room-password-input');
            const name = input.value.trim();
            const password = passInput.value.trim();

            if (!name) return alert('部屋名を入力してください');
            if (password && !/^\d{5}$/.test(password)) {
                return alert('パスワードは数字5桁で入力してください');
            }

            const roomId = 'room-' + Date.now();
            myPeerId = `peer-${myUsername}-${Date.now()}`; // 自分専用のユニークID

            const newRoom = { 
                name: name, 
                id: roomId, 
                creatorName: myUsername,
                hasPassword: password !== "",
                password: password,
                members: { [myPeerId]: myUsername } // 初期メンバーに自分を追加
            };

            isHostOfCurrentRoom = true; 
            currentRoomId = roomId;
            roomMembers = { [myPeerId]: myUsername };

            if (hostConnection) {
                hostConnection.send({ type: 'CREATE_ROOM', roomObj: newRoom });
            } else {
                addRoomToList(newRoom);
            }

            input.value = '';
            passInput.value = '';
            startMultiChat(roomId, name);
        }

        function checkPasswordAndJoin(roomId, roomName) {
            const targetRoom = roomList.find(r => r.id === roomId);
            if (!targetRoom) return;

            if (targetRoom.hasPassword) {
                const userPass = prompt('この部屋にはパスワードが必要です。\n数字5桁を入力してください:');
                if (userPass === null) return; 
                if (userPass !== targetRoom.password) {
                    return alert('パスワードが一致しません。');
                }
            }
            
            myPeerId = `peer-${myUsername}-${Date.now()}`;
            isHostOfCurrentRoom = false;
            currentRoomId = roomId;
            // 既存のメンバーリストをコピー
            roomMembers = Object.assign({}, targetRoom.members);
            
            startMultiChat(roomId, roomName);
        }

        function addRoomToList(roomObj) {
            roomList.push(roomObj);
            renderRoomList();
            broadcastToAll({ type: 'ROOM_LIST', data: roomList });
        }

        function removeRoomFromList(roomId) {
            roomList = roomList.filter(r => r.id !== roomId);
            renderRoomList();
            broadcastToAll({ type: 'ROOM_LIST', data: roomList });
        }

        function broadcastToAll(msg) {
            activeConnections.forEach(conn => {
                if (conn.open) conn.send(msg);
            });
        }

        // 3. 複数人（フルメッシュ）ボイス＆ビデオチャットメイン処理
        async function startMultiChat(roomId, displayTitle) {
            document.getElementById('lobby-view').classList.add('hidden');
            document.getElementById('room-view').classList.remove('hidden');
            document.getElementById('current-room-title').innerText = `部屋: ${displayTitle}`;
            document.getElementById('connection-status').innerText = '準備中...';

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('local-video').srcObject = localStream;
                
                // カメラはデフォルトOFFで開始
                localStream.getVideoTracks().forEach(track => track.enabled = false);
                isCameraOn = false;
                updateCameraBtnStyle();

                // 自分のユニークIDでPeerを初期化
                voicePeer = new Peer(myPeerId);

                voicePeer.on('open', () => {
                    document.getElementById('connection-status').innerText = '🟢 入室中 (人数: ' + Object.keys(roomMembers).length + '人)';
                    renderMemberListUI();

                    // 新規参加者の場合：すでに部屋にいる全員に自分から接続を仕掛ける
                    if (!isHostOfCurrentRoom) {
                        roomMembers[myPeerId] = myUsername; // リストに自分を追加
                        syncMembersToLobby();

                        Object.keys(roomMembers).forEach(targetId => {
                            if (targetId !== myPeerId) {
                                // データ用の接続（名前などの送受信用）
                                const dConn = voicePeer.connect(targetId);
                                setupDataConnection(dConn);
                                
                                // メディア（映像・音声）用の接続
                                const call = voicePeer.call(targetId, localStream, { metadata: { username: myUsername, peerId: myPeerId } });
                                setupCallHandlers(call, targetId);
                            }
                        });
                    }
                });

                // 誰かから接続が来た時（受話側）
                voicePeer.on('connection', (conn) => {
                    setupDataConnection(conn);
                });

                voicePeer.on('call', (call) => {
                    call.answer(localStream);
                    const incomingPeerId = call.metadata ? call.metadata.peerId : call.peer;
                    const incomingUsername = call.metadata ? call.metadata.username : "ゲスト";
                    
                    roomMembers[incomingPeerId] = incomingUsername;
                    renderMemberListUI();
                    setupCallHandlers(call, incomingPeerId);
                });

            } catch (err) {
                console.error(err);
                alert('デバイスの取得に失敗しました。');
                leaveRoom();
            }
        }

        // データ通信の設定（名前の同期や切断検知）
        function setupDataConnection(conn) {
            connectedDataConns[conn.peer] = conn;
            conn.on('data', (data) => {
                if (data.type === 'INTRODUCE') {
                    roomMembers[conn.peer] = data.username;
                    renderMemberListUI();
                }
            });
            conn.on('open', () => {
                conn.send({ type: 'INTRODUCE', username: myUsername });
            });
            conn.on('close', () => {
                handleUserLeft(conn.peer);
            });
        }

        // 通話処理の設定
        function setupCallHandlers(call, targetPeerId) {
            connectedCalls[targetPeerId] = call;

            call.on('stream', (remoteStream) => {
                createOrUpdateRemoteVideo(targetPeerId, remoteStream);
            });

            call.on('close', () => {
                handleUserLeft(targetPeerId);
            });
        }

        // 誰かが抜けた時のクリーンアップ処理
        function handleUserLeft(peerId) {
            if (!roomMembers[peerId]) return;
            
            delete roomMembers[peerId];
            if (connectedCalls[peerId]) {
                connectedCalls[peerId].close();
                delete connectedCalls[peerId];
            }
            if (connectedDataConns[peerId]) {
                connectedDataConns[peerId].close();
                delete connectedDataConns[peerId];
            }

            // 画面のビデオ要素を削除
            const videoContainer = document.getElementById(`video-container-${peerId}`);
            if (videoContainer) videoContainer.remove();

            renderMemberListUI();
            
            // 自分がホストなら、ロビーの部屋情報人数を同期
            if (isHostOfCurrentRoom) {
                syncMembersToLobby();
            }
            
            document.getElementById('connection-status').innerText = '🟢 通話中 (人数: ' + Object.keys(roomMembers).length + '人)';
        }

        // ロビーサーバーに現在の部屋の最新メンバー状態を通知する
        function syncMembersToLobby() {
            if (hostConnection) {
                hostConnection.send({ type: 'UPDATE_ROOM_MEMBERS', roomId: currentRoomId, members: roomMembers });
            } else {
                const room = roomList.find(r => r.id === currentRoomId);
                if (room) {
                    room.members = roomMembers;
                    broadcastToAll({ type: 'ROOM_LIST', data: roomList });
                }
            }
        }

        // 相手用のビデオ画面を新しく生成・配置する関数
        function createOrUpdateRemoteVideo(peerId, stream) {
            const grid = document.getElementById('video-grid');
            let container = document.getElementById(`video-container-${peerId}`);
            
            if (!container) {
                container = document.createElement('div');
                container.className = 'video-container';
                container.id = `video-container-${peerId}`;
                
                const video = document.createElement('video');
                video.id = `video-${peerId}`;
                video.autoplay = true;
                video.playsInline = true;
                
                const label = document.createElement('div');
                label.className = 'video-label';
                label.innerText = roomMembers[peerId] || "参加者";
                
                container.appendChild(video);
                container.appendChild(label);
                grid.appendChild(container);
            }
            
            const videoEl = document.getElementById(`video-${peerId}`);
            videoEl.srcObject = stream;
        }

        // 参加メンバーリスト（音量バー付き）の描画
        function renderMemberListUI() {
            const listEl = document.getElementById('member-list');
            listEl.innerHTML = "";

            Object.keys(roomMembers).forEach(pId => {
                const uName = roomMembers[pId];
                const li = document.createElement('li');
                li.className = "member-item";

                if (pId === myPeerId) {
                    li.innerHTML = `<div class="member-info"><span>👤 <b>${uName}</b> (あなた)</span></div>`;
                } else {
                    li.innerHTML = `
                        <div class="member-info"><span>👤 <b>${uName}</b></span></div>
                        <div class="volume-container">
                            <span>🔈</span>
                            <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" oninput="changeRemoteVolume('${pId}', this.value)">
                            <span>🔊</span>
                        </div>
                    `;
                }
                listEl.appendChild(li);
            });
        }

        function changeRemoteVolume(peerId, value) {
            const videoEl = document.getElementById(`video-${peerId}`);
            if (videoEl) {
                videoEl.volume = value;
            }
        }

        function toggleMute() {
            if (!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if (isMuted) {
                audioTrack.enabled = true;
                document.getElementById('mute-btn').innerText = '🎙️ 自分をマイクON';
                document.getElementById('mute-btn').className = 'active';
                isMuted = false;
            } else {
                audioTrack.enabled = false;
                document.getElementById('mute-btn').innerText = '🔇 ミュート中';
                document.getElementById('mute-btn').className = 'danger';
                isMuted = true;
            }
        }

        function toggleCamera() {
            if (!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) return alert('カメラが見つかりません');

            if (isCameraOn) {
                videoTrack.enabled = false;
                isCameraOn = false;
            } else {
                videoTrack.enabled = true;
                isCameraOn = true;
            }
            updateCameraBtnStyle();
        }

        function updateCameraBtnStyle() {
            const btn = document.getElementById('camera-btn');
            if (isCameraOn) {
                btn.innerText = '🎥 自分をカメラON';
                btn.className = 'active';
            } else {
                btn.innerText = '📁 自分をカメラOFF';
                btn.className = 'danger';
            }
        }

        // 退室
        function leaveRoom() {
            // 自分がホストだった場合は部屋を完全削除（解散）
            if (isHostOfCurrentRoom && currentRoomId) {
                if (hostConnection) {
                    hostConnection.send({ type: 'REMOVE_ROOM', roomId: currentRoomId });
                } else {
                    removeRoomFromList(currentRoomId);
                }
            } else if (currentRoomId) {
                // ゲストが抜ける場合は自分をメンバーから引いて同期
                delete roomMembers[myPeerId];
                syncMembersToLobby();
            }

            // 全ての接続をクリア
            Object.keys(connectedCalls).forEach(id => connectedCalls[id].close());
            Object.keys(connectedDataConns).forEach(id => connectedDataConns[id].close());
            connectedCalls = {};
            connectedDataConns = {};
            roomMembers = {};

            if (voicePeer) {
                voicePeer.destroy();
                voicePeer = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // 自分のビデオ以外（生成された相手のビデオ）をグリッドから削除
            const grid = document.getElementById('video-grid');
            grid.innerHTML = `
                <div class="video-container" id="local-video-container">
                    <video id="local-video" autoplay playsinline muted></video>
                    <div class="video-label">あなた</div>
                </div>
            `;

            isMuted = false;
            isCameraOn = false;
            isHostOfCurrentRoom = false;
            currentRoomId = "";
            
            document.getElementById('mute-btn').innerText = '🎙️ 自分をマイクON';
            document.getElementById('mute-btn').className = 'active';
            
            document.getElementById('lobby-view').classList.remove('hidden');
            document.getElementById('room-view').classList.add('hidden');
        }

        window.onbeforeunload = () => {
            leaveRoom();
        };
    </script>
</body>
</html>
